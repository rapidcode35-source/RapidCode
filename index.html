<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RapidCode Vault</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="mobile-app-container">
        
        <header>
            <img src="banner.jpg" alt="RapidCode Banner" class="banner-img">
        </header>

        <main class="content-area">
            
            <div class="search-section">
                <input type="text" id="searchInput" placeholder="Search project (e.g., project-1)">
            </div>

            <div id="codeDisplayArea"></div>

            <div class="community-section">
                <h3>Click and join our community</h3>
                <div class="social-buttons">
                    <a href="#" id="youtubeBtn" class="social-btn youtube" target="_blank">
                        <i class="fa-brands fa-youtube"></i> YouTube
                    </a>
                    
                    <a href="#" id="instaBtn" class="social-btn instagram" target="_blank">
                        <i class="fa-brands fa-instagram"></i> Instagram
                    </a>
                </div>
            </div>

        </main>

        <footer class="contact-section">
            <h3>Help & Contact</h3>
            <p>Email: <a href="#" id="displayEmail" class="highlight-email">Loading...</a></p>
        </footer>

    </div>

    <script src="script.js"></script>
</body>
</html>
